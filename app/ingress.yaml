apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devsecops-petclinic-ingress
  namespace: petclinic-dev
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devsecops-petclinic-service
                port:
                  number: 8080