apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-petclinic
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/dnyaneshwar-gitte/devsecops-petclinic-gitops
    targetRevision: main
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true